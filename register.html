<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediction Market</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


    <style>

        .form-container {
            max-width: 650px;
            margin: auto;
        }

        .form-label {
            letter-spacing: 3px;
            font-size: 12px;
            color: #777;
            margin-bottom: 10px;
        }

        .form-control {
            border: 2px solid #000000;
            border-radius: 12px;
            padding: 18px;
            font-size: 20px;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            background: #000000;
            color: #ffffff;
            box-shadow: none;
        }

        .btn-custom {
            margin-top: 30px;
            padding: 15px;
            border-radius: 12px;
            background: #000000;
            color: #ffffff;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #D72323;
            color: #ffffff;
        }

        .footer-text {
            margin-top: 20px;
            color: #000000;
        }

        .footer-text a {
            color: #D72323;
        }

    </style>


</head>

<body>

    <!-- top of page nav bar-->
    <nav class="navbar navbar-expand-lg top-nav">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="indian-cow-vector-silhouette-illustration_1193756-2634.avif" alt="logo" width="150"
                    height="150" class="me-2">
                <span>BULL MARKET</span>
            </a>
            <div class="d-flex ms-auto">
                <a href="signin.html" class="btn btn-outline-dark me-2">Sign in</a>
                <a href="register.html" class="btn btn-dark">Register</a>
            </div>
        </div>
    </nav>

    <!-- Form -->>
    <div class="container form-container">
        <h1 style = "font-size: 50px;">Create your account</h1>

        <form onsubmit="redirectUser(event)">
            <div class="mb-4">
                <label class="form-label">FIRST NAME</label>
                <input type="text" class="form-control" placeholder="first name">
            </div>

            <div class="mb-4">
                <label class="form-label">LAST NAME</label>
                <input type="text" class="form-control" placeholder="last name">
            </div>

            <div class="mb-4">
                <label class="form-label">EMAIL ADDRESS</label>
                <input type="email" class="form-control" placeholder="bullmarket@example.com">
            </div>

            <div class="mb-4">
                <label class="form-label">PASSWORD</label>
                <input type="password" class="form-control" placeholder="**********">
            </div>

            <button class="btn btn-custom w-100">CREATE ACCOUNT →</button>

            <p class="text-center footer-text"> Already a member? <a href="signin.html">Sign in</a> </p>
        </form>

        <script id="r8lq3n">
            function redirectUser(event) {
                event.preventDefault(); 
                window.location.href = "index.html";
            }
        </script>

    </div>

</body>
