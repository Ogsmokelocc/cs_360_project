<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediction Market</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


    <style>

        .form-container {
            max-width: 650px;
            margin: auto;
        }

        .form-label {
            letter-spacing: 3px;
            font-size: 12px;
            color: #777;
            margin-bottom: 10px;
        }

        .form-control {
            border: 2px solid #000000;
            border-radius: 12px;
            padding: 18px;
            font-size: 20px;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus {
            background: #000000;
            color: #ffffff;
            box-shadow: none;
        }

        .btn-custom {
            margin-top: 30px;
            padding: 15px;
            border-radius: 12px;
            background: #000000;
            color: #ffffff;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #D72323; 
            color: #ffffff;
        }

        .footer-text {
            margin-top: 20px;
            color: #000000;
        }

        .footer-text a {
            color: #D72323;
        }

    </style>


</head>

<body>

    <!-- top of page nav bar-->
    <nav class="navbar navbar-expand-lg top-nav">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="indian-cow-vector-silhouette-illustration_1193756-2634.avif" alt="logo" width="150"
                    height="150" class="me-2">
                <span>BULL MARKET</span>
            </a>
            <div class="d-flex ms-auto">
                <a href="signin.html" class="btn btn-outline-dark me-2">Sign in</a>
                <a href="index.html" class="btn btn-dark">Home</a>
            </div>
        </div>
    </nav>

    <!-- Form -->
    <div class = "container form-container">
        <h1 style = "font-size: 50px;">Create your account</h1>

        <form>
            <div class = "mb-4">
                <label class = "form-label">FIRST NAME</label>
                <input type = "text" id = "firstname" class = "form-control" placeholder = "first name">
            </div>

            <div class = "mb-4">
                <label class = "form-label">LAST NAME</label>
                <input type = "text" id = "lastname" class = "form-control" placeholder = "last name">
            </div>

            <div class = "mb-4">
                <label class = "form-label">EMAIL ADDRESS</label>
                <input type = "email" id = "email" class = "form-control" placeholder = "bullmarket@example.com">
            </div>

            <div class = "mb-4">
                <label class = "form-label">PASSWORD</label>
                <input type = "password" id = "password" class = "form-control" placeholder = "**********">
            </div>
            
            <button type="button" class="btn btn-custom w-100" onclick="registerUser()">
            CREATE ACCOUNT →
            </button>
            <p id="error-msg" style="color: #D72323; text-align: center; margin-top: 10px;"></p>
            <p class="text-center footer-text">Already a member? <a href="signin.html">Sign in</a></p>
        </form>

       <script>
            async function registerUser() {
            // gets the values from the form
            const firstname = document.getElementById('firstname').value.trim();
            const lastname  = document.getElementById('lastname').value.trim();
            const email     = document.getElementById('email').value.trim();
            const password  = document.getElementById('password').value;
            const errorMsg  = document.getElementById('error-msg');

            // does validation
            if (!firstname || !lastname || !email || !password) {
                errorMsg.textContent = 'Please fill in all fields.';
                return;
            }

            // sends the data to server using  fetch
            try {
                const response = await fetch('http://localhost:3000/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'  // sends json
                },
                body: JSON.stringify({ firstname, lastname, email, password })
                });

                const data = await response.json(); //server response

                if (response.ok) {
                // good
                window.location.href = 'index.html';
                } else {
                // bad
                errorMsg.textContent = data.error ?? 'Registration failed.';
                }

            } catch (err) {
                // network error
                errorMsg.textContent = 'Could not connect to server.';
            }
            }
            </script>

    </div>

</body>
