<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediction Market</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


</head>

<body>
    <!-- top of page nav bar-->
    <nav class="navbar navbar-expand-lg top-nav">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="indian-cow-vector-silhouette-illustration_1193756-2634.avif" alt="logo" width="150"
                    height="150" class="me-2">
                <span>BULL MARKET</span>
            </a>
            <div class="d-flex ms-auto">
                <a href="signin.html" class="btn btn-outline-dark me-2">Sign in</a>
                <a href="register.html" class="btn btn-dark">Register</a>
            </div>
        </div>
    </nav>


    <!--middle section-->
    <section class="middle-section container-fluid">
        <div>
            <canvas id="marketChart" width="800" height="400"></canvas>
        </div>
        <!-- Social Media Icons -->
        <div class="social-icons">
            <a href="#" aria-label="Email"><i class="bi bi-envelope-fill"></i></a>
            <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#" aria-label="GitHub"><i class="bi bi-github"></i></a>
            <a href="#" aria-label="Twitter"><i class="bi bi-twitter"></i></a>
        </div>
    </section>





    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let chart;
        let markets = [];
        let index = 0;

        async function loadMarkets() {
            try {
                const res = await fetch("http://localhost:3000/markets");
                const data = await res.json();

                console.log("DATA:", data);

                if (!data || data.length === 0) {
                    console.error("No markets returned");
                    return;
                }

                markets = data;

                initChart();
                setInterval(switchMarket, 4000);
            } catch (err) {
                console.error("FETCH ERROR:", err);
            }
        }



        function initChart() {
            const ctx = document.getElementById("marketChart").getContext("2d");

            const firstMarket = markets[0];
            const price = firstMarket.outcomePrices
                ? parseFloat(firstMarket.outcomePrices[0]) * 100
                : 50;

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ["Now"], // will update later
                    datasets: [{
                        label: firstMarket.question || "Market",
                        data: [price],
                        borderColor: 'rgba(255, 99, 132, 1)',
                        backgroundColor: 'rgba(255, 99, 132, 0.2)',
                        fill: true,
                        tension: 0.4, // smooth curves
                        pointRadius: 6,
                        pointHoverRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                font: {
                                    size: 16
                                }
                            }
                        },
                        tooltip: {
                            enabled: true,
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Time',
                                font: { size: 14, weight: 'bold' }
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Probability %',
                                font: { size: 14, weight: 'bold' }
                            },
                            min: 0,
                            max: 100
                        }
                    }
                }
            });
        }
        function switchMarket() {
            index = (index + 1) % markets.length;

            const market = markets[index];

            chart.data.datasets[0].label = market.question;
            chart.data.datasets[0].data = [market.outcomes[0].price * 100];

            chart.update();
        }

        loadMarkets();
    </script>

</body>
