<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Bull Market</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .top-nav { background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .navbar-brand { font-weight: bold; font-size: 1.4rem; color: #000; }
    .nav-link { color: #000 !important; font-weight: 500; }
    .nav-link:hover { color: #D72323 !important; }
    .balance-card { background: linear-gradient(135deg, #000 0%, #2d2d2d 100%); color: #fff; border-radius: 16px; padding: 2rem; }
    .balance-card .amount { font-size: 2.5rem; font-weight: 700; }
    .stat-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .badge-live { background-color: #D72323; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .badge-upcoming { background-color: #000; }
    .badge-won { background-color: #198754; }
    .badge-lost { background-color: #D72323; }
    .badge-pending { background-color: #6c757d; }
    .event-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: transform 0.2s; cursor: pointer; }
    .event-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .btn-bet { background-color: #000; color: #fff; border: none; }
    .btn-bet:hover { background-color: #D72323; color: #fff; }
    .section-title { font-weight: 700; font-size: 1.2rem; border-left: 4px solid #D72323; padding-left: 0.75rem; margin-bottom: 1.25rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg top-nav">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="indian-cow-vector-silhouette-illustration_1193756-2634.avif" alt="logo" width="50" height="50" class="me-2">
      BULL MARKET
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="markets.html"><i class="bi bi-bar-chart-line me-1"></i>Markets</a></li>
        <li class="nav-item"><a class="nav-link fw-bold" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="account.html"><i class="bi bi-wallet2 me-1"></i>Account</a></li>
      </ul>
      <div class="d-flex" id="nav-auth"></div>
    </div>
  </div>
</nav>

<div class="container py-4">

  <!-- Welcome + balance -->
  <div class="row mb-4">
    <div class="col-md-4 mb-3 mb-md-0">
      <div class="balance-card h-100">
        <div class="text-white-50 mb-1 small">Your Balance</div>
        <div class="amount" id="balanceDisplay">£0.00</div>
        <div class="mt-3 d-flex gap-2">
          <a href="account.html" class="btn btn-light btn-sm">Deposit</a>
          <a href="account.html" class="btn btn-outline-light btn-sm">Withdraw</a>
        </div>
      </div>
    </div>
    <div class="col-md-8">
      <div class="row g-3 h-100">
        <div class="col-4">
          <div class="stat-card card text-center p-3 h-100">
            <div class="fs-3 fw-bold" id="statTotal">0</div>
            <div class="text-muted small">Total Bets</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card card text-center p-3 h-100">
            <div class="fs-3 fw-bold text-success" id="statWon">0</div>
            <div class="text-muted small">Won</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card card text-center p-3 h-100">
            <div class="fs-3 fw-bold" style="color:#D72323" id="statPending">0</div>
            <div class="text-muted small">Pending</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <!-- Recent bets -->
    <div class="col-lg-7 mb-4">
      <div class="section-title">Recent Bets</div>
      <div id="recentBets">
        <div class="text-muted text-center py-5">Loading bets...</div>
      </div>
      <a href="#" class="btn btn-outline-dark btn-sm mt-2" id="viewAllBets" style="display:none">View all bets</a>
    </div>

    <!-- Featured events -->
    <div class="col-lg-5 mb-4">
      <div class="section-title">Featured Markets</div>
      <div id="featuredEvents">
        <div class="text-muted text-center py-5">Loading events...</div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const stored = localStorage.getItem('user');
  if (!stored) { window.location.href = 'signin.html'; }
  const user = JSON.parse(stored);

  document.getElementById('nav-auth').innerHTML = `
    <span class="navbar-text me-3 fw-semibold">👤 ${user.username}</span>
    <button class="btn btn-outline-dark btn-sm" onclick="logout()">Log out</button>
  `;

  function logout() { localStorage.removeItem('user'); window.location.href = 'index.html'; }

  function statusBadge(status) {
    const map = { live: 'badge-live', upcoming: 'badge-upcoming', won: 'badge-won', lost: 'badge-lost', pending: 'badge-pending', finished: 'badge-upcoming' };
    return `<span class="badge ${map[status] || 'badge-pending'}">${status.toUpperCase()}</span>`;
  }

  function formatDate(dt) {
    return new Date(dt).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  async function loadDashboard() {
    // Account balance
    try {
      const r = await fetch(`/api/users/${user.id}/account`);
      const acc = await r.json();
      document.getElementById('balanceDisplay').textContent = `£${parseFloat(acc.balance).toFixed(2)}`;
    } catch {}

    // Bets
    try {
      const r = await fetch(`/api/users/${user.id}/bets`);
      const bets = await r.json();
      const total = bets.length;
      const won = bets.filter(b => b.status === 'won').length;
      const pending = bets.filter(b => b.status === 'pending').length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statWon').textContent = won;
      document.getElementById('statPending').textContent = pending;

      const recent = bets.slice(0, 5);
      if (recent.length === 0) {
        document.getElementById('recentBets').innerHTML = `<div class="text-muted text-center py-4">No bets yet. <a href="markets.html">Browse markets</a></div>`;
      } else {
        document.getElementById('recentBets').innerHTML = recent.map(bet => {
          const selNames = bet.selections.map(s => `<span class="text-truncate d-block" style="max-width:200px">${s.event_name}: ${s.selection_name}</span>`).join('');
          return `
            <div class="card stat-card mb-2 p-3">
              <div class="d-flex justify-content-between align-items-start">
                <div class="me-2" style="min-width:0">${selNames}</div>
                ${statusBadge(bet.status)}
              </div>
              <div class="d-flex justify-content-between mt-2 small text-muted">
                <span>Stake: <strong>£${parseFloat(bet.stake_amount).toFixed(2)}</strong></span>
                <span>Odds: <strong>${parseFloat(bet.total_odds).toFixed(2)}</strong></span>
                <span>Payout: <strong>£${parseFloat(bet.potential_payout).toFixed(2)}</strong></span>
              </div>
              <div class="small text-muted mt-1">${formatDate(bet.placed_at)}</div>
            </div>`;
        }).join('');
        if (bets.length > 5) document.getElementById('viewAllBets').style.display = '';
      }
    } catch {}

    // Featured events
    try {
      const r = await fetch('/api/events?status=live');
      const liveEvents = await r.json();
      const r2 = await fetch('/api/events?status=upcoming');
      const upcomingEvents = await r2.json();
      const events = [...liveEvents, ...upcomingEvents].slice(0, 4);

      if (events.length === 0) {
        document.getElementById('featuredEvents').innerHTML = `<div class="text-muted text-center py-4">No upcoming events</div>`;
      } else {
        document.getElementById('featuredEvents').innerHTML = events.map(ev => `
          <div class="event-card card mb-2 p-3" onclick="window.location='event.html?id=${ev.event_id}'">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold">${ev.name}</div>
                <div class="small text-muted">${ev.sport_name} · ${formatDate(ev.start_time)}</div>
              </div>
              ${statusBadge(ev.status)}
            </div>
          </div>`).join('');
      }
    } catch {}
  }

  loadDashboard();
</script>
</body>
</html>
