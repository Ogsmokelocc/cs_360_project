<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In - Bull Market</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-box {
      background-color: #ffffff;
      padding: 2rem;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }

    .form-box h2 {
      margin-bottom: 1.5rem;
      color: #000000;
      text-align: center;
    }

    .form-text {
      color: #000000;
    }

    .form-box .btn-primary {
      background-color: #000000;
      border-color: #4D0100;
      width: 100%;
      font-weight: 600;
    }

    .form-box .btn-primary:hover {
      background-color: #00bfff;
      border-color: #ffffff;
    }

    .form-box a {
      color: #00bfff;
      text-decoration: none;
    }

    .form-box a:hover {
      text-decoration: underline;
    }

    .back-link {
      color: #000000;
      margin-top: 1rem;
      display: block;
      text-align: center;
      text-decoration: none;
    }

    .back-link:hover {
      color: #00bfff;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-box">
      <h2>Sign In</h2>
      <form id="loginForm">
        <div class="mb-3">
          <label for="inputEmail" for="inputUsername" class="form-label">Email address or Username</label>
          <input type="email" class="form-control" id="inputEmail" placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
          <label for="inputPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="inputPassword" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary mb-3">Sign In</button>
      </form>
      <p class="form-text text-center">Don't have an account? <a href="register.html">Register now</a></p>
      <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    document.getElementById('form').addEventListener('submit', async (e) =>{
      e.preventDefulat();

      const Username = document.getElementById(inputUsername).value;
      const email = document.getElementById(inputEmail).value;
      const password = document.getElementById(inputPassword).value;

      try{
        const response = await fetch('/api/login', {
          method: 'POST',
          headers:{'Content-Type': 'application/json'},
          body: JSON.stringify({Username,email,password}),
        });

        if(response.ok){
          const data = await response.json();
          console.log('login successful:', data);
          window.location.href = data.redirect;
        } else {
          const error = await response.json();
          alert(data.message);
        }
      } catch(err) {
        console.error('ERROR:', err);
        alert('Error logging in, please try again.');
      }
    });

    
  </script>
  
  
</body>
</html>
