<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In - Bull Market</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-box {
      background-color: #ffffff;
      padding: 2rem;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
    }

    .form-box h2 {
      margin-bottom: 1.5rem;
      color: #000000;
      text-align: center;
    }

    .form-text {
      color: #000000;
    }

    .form-box .btn-primary {
      background-color: #000000;
      border-color: #4D0100;
      width: 100%;
      font-weight: 600;
    }

    .form-box .btn-primary:hover {
      background-color: #D72323;
      border-color: #ffffff;
    }

    .form-box a {
      color: #D72323;
      text-decoration: none;
    }

    .form-box a:hover {
      text-decoration: underline;
    }

    .back-link {
      color: #000000;
      margin-top: 1rem;
      display: block;
      text-align: center;
      text-decoration: none;
    }

    .back-link:hover {
      color: #D72323;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-box">
      <h2>Sign In</h2>
      <form id="loginForm">
        <div class="mb-3">
          <label for="inputEmail" for="inputUsername" class="form-label">Email address or Username</label>
          <input type="text" class="form-control" id="inputEmail" placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
          <label for="inputPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="inputPassword" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary mb-3">Sign In</button>
      </form>
      <p class="form-text text-center">Don't have an account? <a href="register.html">Register now</a></p>
      <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
      <p id="error-msg" style="color: #D72323; text-align: center; margin-top: 10px;"></p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    // prevent from refresh
    e.preventDefault();

    // get values
    const email    = document.getElementById('inputEmail').value.trim();
    const password = document.getElementById('inputPassword').value;
    const errorMsg = document.getElementById('error-msg');

    // validation
    if (!email || !password) {
      errorMsg.textContent = 'Please fill in all fields.';
      return;
    }

    try {
      // sends to server
      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();

      if (response.ok) {
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'index.html';
      } else {
        // error message
        errorMsg.textContent = data.error ?? 'Login failed. Try again.';
      }

    } catch (err) {
      errorMsg.textContent = 'Could not connect to server. Is it running?';
    }
  });
  </script>
  
  
</body>
</html>
