<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account - Bull Market</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .top-nav { background-color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .navbar-brand { font-weight: bold; font-size: 1.4rem; color: #000; }
    .nav-link { color: #000 !important; font-weight: 500; }
    .nav-link:hover { color: #D72323 !important; }
    .balance-card { background: linear-gradient(135deg, #000 0%, #2d2d2d 100%); color: #fff; border-radius: 16px; padding: 2rem; }
    .balance-card .amount { font-size: 2.8rem; font-weight: 700; }
    .action-card { border-radius: 16px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .nav-tabs .nav-link { color: #000 !important; font-weight: 600; border: none; border-bottom: 3px solid transparent; border-radius: 0; }
    .nav-tabs .nav-link.active { border-bottom-color: #D72323; color: #D72323 !important; background: transparent; }
    .form-control:focus { border-color: #000; box-shadow: none; }
    .btn-action { background-color: #000; color: #fff; border: none; border-radius: 10px; padding: 0.7rem 2rem; font-weight: 600; }
    .btn-action:hover { background-color: #D72323; color: #fff; }
    .quick-amount { border-radius: 20px; font-size: 0.85rem; }
    .tx-type-deposit { color: #198754; }
    .tx-type-win { color: #198754; }
    .tx-type-withdrawal { color: #D72323; }
    .tx-type-bet { color: #D72323; }
    .tx-type-refund { color: #0d6efd; }
    .tx-icon-deposit::before { content: '↑'; }
    .tx-icon-win::before { content: '★'; }
    .tx-icon-withdrawal::before { content: '↓'; }
    .tx-icon-bet::before { content: '🎯'; }
    .tx-icon-refund::before { content: '↺'; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg top-nav">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="indian-cow-vector-silhouette-illustration_1193756-2634.avif" alt="logo" width="50" height="50" class="me-2">
      BULL MARKET
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="markets.html"><i class="bi bi-bar-chart-line me-1"></i>Markets</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link fw-bold" href="account.html"><i class="bi bi-wallet2 me-1"></i>Account</a></li>
      </ul>
      <div class="d-flex" id="nav-auth"></div>
    </div>
  </div>
</nav>

<div class="container py-4">

  <h1 class="fw-bold mb-4">My Account</h1>

  <!-- Balance -->
  <div class="row mb-4">
    <div class="col-md-5">
      <div class="balance-card">
        <div class="text-white-50 small mb-1">Available Balance</div>
        <div class="amount" id="balanceDisplay">£0.00</div>
        <div class="text-white-50 small mt-2">GBP</div>
      </div>
    </div>
    <div class="col-md-7 mt-3 mt-md-0">
      <div class="action-card card p-3 h-100">
        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" id="actionTabs">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#depositTab">
              <i class="bi bi-arrow-down-circle me-1"></i>Deposit
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#withdrawTab">
              <i class="bi bi-arrow-up-circle me-1"></i>Withdraw
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- Deposit -->
          <div class="tab-pane fade show active" id="depositTab">
            <label class="form-label fw-semibold">Amount (£)</label>
            <div class="input-group mb-2">
              <span class="input-group-text">£</span>
              <input type="number" id="depositAmount" class="form-control" placeholder="0.00" min="1" step="0.01">
            </div>
            <div class="d-flex gap-2 mb-3">
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('depositAmount').value=10">£10</button>
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('depositAmount').value=25">£25</button>
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('depositAmount').value=50">£50</button>
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('depositAmount').value=100">£100</button>
            </div>
            <button class="btn btn-action" onclick="deposit()">Deposit Funds</button>
            <div id="depositMsg" class="mt-2"></div>
          </div>

          <!-- Withdraw -->
          <div class="tab-pane fade" id="withdrawTab">
            <label class="form-label fw-semibold">Amount (£)</label>
            <div class="input-group mb-2">
              <span class="input-group-text">£</span>
              <input type="number" id="withdrawAmount" class="form-control" placeholder="0.00" min="1" step="0.01">
            </div>
            <div class="d-flex gap-2 mb-3">
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('withdrawAmount').value=10">£10</button>
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('withdrawAmount').value=25">£25</button>
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('withdrawAmount').value=50">£50</button>
              <button class="btn btn-outline-secondary quick-amount flex-fill" onclick="document.getElementById('withdrawAmount').value=100">£100</button>
            </div>
            <button class="btn btn-action" onclick="withdraw()">Withdraw Funds</button>
            <div id="withdrawMsg" class="mt-2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transactions -->
  <div class="action-card card p-3">
    <h5 class="fw-bold mb-3"><i class="bi bi-clock-history me-2"></i>Transaction History</h5>
    <div id="transactionsList">
      <div class="text-center py-4 text-muted">Loading transactions...</div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const stored = localStorage.getItem('user');
  if (!stored) { window.location.href = 'signin.html'; }
  const user = JSON.parse(stored);

  document.getElementById('nav-auth').innerHTML = `
    <span class="navbar-text me-3 fw-semibold">👤 ${user.username}</span>
    <button class="btn btn-outline-dark btn-sm" onclick="logout()">Log out</button>`;
  function logout() { localStorage.removeItem('user'); window.location.href = 'index.html'; }

  function formatDate(dt) {
    return new Date(dt).toLocaleString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  async function loadBalance() {
    const r = await fetch(`/api/users/${user.id}/account`);
    const acc = await r.json();
    document.getElementById('balanceDisplay').textContent = `£${parseFloat(acc.balance).toFixed(2)}`;
  }

  async function loadTransactions() {
    const r = await fetch(`/api/users/${user.id}/transactions`);
    const txs = await r.json();

    if (txs.length === 0) {
      document.getElementById('transactionsList').innerHTML = `<div class="text-muted text-center py-4">No transactions yet</div>`;
      return;
    }

    const rows = txs.map(tx => {
      const isCredit = ['deposit', 'win', 'refund'].includes(tx.type);
      const sign = isCredit ? '+' : '-';
      const cls = `tx-type-${tx.type}`;
      return `
        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
          <div>
            <span class="fw-semibold text-capitalize">${tx.type}</span>
            <div class="small text-muted">${formatDate(tx.created_at)}</div>
          </div>
          <div class="fw-bold ${cls}" style="font-size:1.05rem">${sign}£${parseFloat(tx.amount).toFixed(2)}</div>
        </div>`;
    }).join('');

    document.getElementById('transactionsList').innerHTML = rows;
  }

  async function deposit() {
    const amount = parseFloat(document.getElementById('depositAmount').value);
    const msg = document.getElementById('depositMsg');
    if (!amount || amount <= 0) { msg.innerHTML = `<div class="alert alert-warning py-2">Enter a valid amount</div>`; return; }

    const r = await fetch('/api/account/deposit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: user.id, amount })
    });
    const data = await r.json();

    if (r.ok) {
      msg.innerHTML = `<div class="alert alert-success py-2">Deposited £${amount.toFixed(2)}</div>`;
      document.getElementById('depositAmount').value = '';
      loadBalance();
      loadTransactions();
    } else {
      msg.innerHTML = `<div class="alert alert-danger py-2">${data.error}</div>`;
    }
  }
  window.deposit = deposit;

  async function withdraw() {
    const amount = parseFloat(document.getElementById('withdrawAmount').value);
    const msg = document.getElementById('withdrawMsg');
    if (!amount || amount <= 0) { msg.innerHTML = `<div class="alert alert-warning py-2">Enter a valid amount</div>`; return; }

    const r = await fetch('/api/account/withdraw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: user.id, amount })
    });
    const data = await r.json();

    if (r.ok) {
      msg.innerHTML = `<div class="alert alert-success py-2">Withdrawn £${amount.toFixed(2)}</div>`;
      document.getElementById('withdrawAmount').value = '';
      loadBalance();
      loadTransactions();
    } else {
      msg.innerHTML = `<div class="alert alert-danger py-2">${data.error}</div>`;
    }
  }
  window.withdraw = withdraw;

  loadBalance();
  loadTransactions();
</script>
</body>
</html>
